server:
  http_address: ":8080"
  ssh_address: ":2222"

storage:
  driver: "sqlite"
  dsn: "sentinel.db"

security:
  allowed_cidrs:
    - "127.0.0.1/32"
    - "::1/128"
  rate_limit: 120
  rate_window: "1m"

auth:
  jwt_secret: "change-me-in-production"
  token_ttl: "12h"
  password_min_length: 14

bootstrap:
  admin_username: "admin"
  admin_password: "ChangeThisAdminPassword!"
  admin_display_name: "Sentinel Administrator"

plugins:
  webhook_audit_url: ""

observability:
  log_level: "info"

api:
  cors_allowed_origins:
    - "http://localhost:5173"
